<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat Client</title>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --border-color: #ccc;
            --text-color: #333;
            --button-bg: #e0e0e0;
            --button-hover: #d0d0d0;
            --status-connected: #2e7d32;
            --status-disconnected: #c62828;
            --input-border: #888;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Control Bar */
        .control-bar {
            background-color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 8px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #000;
        }

        button {
            padding: 8px 16px;
            background-color: var(--button-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--button-hover);
        }

        #status-text {
            margin-left: auto;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .connected { background-color: #e8f5e9; color: var(--status-connected); }
        .disconnected { background-color: #ffebee; color: var(--status-disconnected); }

        /* Main Chat Area */
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Scrollbar styling for Firefox and Chrome */
        #chat-container::-webkit-scrollbar {
            width: 10px;
        }
        #chat-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 5px;
        }

        /* Individual Message Style */
        .message-line {
            padding: 5px 10px;
            max-width: 800px;
            width: 100%;
            border-bottom: 1px solid #eee;
            line-height: 1.4;
        }

        .message-content {
            white-space: pre-wrap;       /* Handles newlines */
            word-break: break-word;      /* Handles long strings */
        }

        /* Footer Input */
        .footer-bar {
            background-color: #fff;
            border-top: 1px solid var(--border-color);
            padding: 10px;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex-grow: 1;
        }

        /* Utility to hide elements if needed */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Connection Controls -->
    <div class="control-bar">
        <div class="control-group">
            <label for="server-url">Server:</label>
            <input type="text" id="server-url" value="ws://localhost:3000" placeholder="ws://server:port">
        </div>
        <div class="control-group">
            <label for="user-name">Name:</label>
            <input type="text" id="user-name" placeholder="Your Name">
        </div>
        <button id="btn-connect">Connect</button>
        <button id="btn-disconnect" disabled>Disconnect</button>
        <div id="status-text" class="disconnected">Disconnected</div>
    </div>

    <!-- Message Display Area -->
    <div id="chat-container"></div>

    <!-- Message Input -->
    <div class="footer-bar">
        <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
        <button id="btn-send" disabled>Send</button>
    </div>

    <script>
        // --- DOM Elements ---
        const serverUrlInput = document.getElementById('server-url');
        const userNameInput = document.getElementById('user-name');
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const btnConnect = document.getElementById('btn-connect');
        const btnDisconnect = document.getElementById('btn-disconnect');
        const btnSend = document.getElementById('btn-send');
        const statusText = document.getElementById('status-text');

        // --- State ---
        let socket = null;

        // --- Utilities ---
        
        /**
         * Formats the ISO timestamp and adds metadata to an HTML element
         */
        function createMessageElement(type, name, text, timestamp, isUser) {
            const div = document.createElement('div');
            div.className = 'message-line';
            
            if (!timestamp) {
                // For error cases or immediate send, use current time
                timestamp = new Date().toISOString();
            }
            
            const dateObj = new Date(timestamp);
            const timeString = dateObj.toLocaleString();

            // Format: [Time] Name: Text
            div.innerHTML = `
                <span style="font-size: 0.8em; color: #666;">[${timeString}]</span> 
                <span class="message-content">${escapeHtml(name + ': ' + text)}</span>
            `;

            return div;
        }

        /**
         * Basic HTML escaping to prevent XSS
         */
        function escapeHtml(text) {
            if (typeof text !== 'string') text = String(text);
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // --- Core Logic ---

        function setConnectedState(isConnected) {
            if (isConnected) {
                statusText.textContent = "Connected";
                statusText.className = "connected";
                
                btnConnect.disabled = true;
                btnDisconnect.disabled = false;
                btnSend.disabled = false;
            } else {
                statusText.textContent = "Disconnected";
                statusText.className = "disconnected";
                
                btnConnect.disabled = false;
                btnConnect.textContent = isConnected ? "Reconnect" : "Connect"; // Reset text if needed
                btnDisconnect.disabled = true;
                btnSend.disabled = true;
            }
        }

        function updateDisplay(data) {
            const type = data.type;
            let name, text;

            switch (type) {
                case 'message': {
                    name = data.name || 'Unknown';
                    text = data.text || '';
                    const el = createMessageElement(type, name, text, data.timestamp);
                    chatContainer.appendChild(el);
                    break;
                }

                case 'join': {
                    // Special rendering for join messages to look distinct? 
                    // Prompt says "Display all chat messages the same way", so we stick to same format.
                    name = data.name || 'System';
                    text = `${data.name || 'Someone'} joined the chat.`;
                    const joinEl = createMessageElement(type, name, text, data.timestamp);
                    chatContainer.appendChild(joinEl);
                    break;
                }

                case 'leave': {
                    name = data.name || 'System';
                    text = `${data.name || 'Someone'} left the chat.`;
                    const leaveEl = createMessageElement(type, name, text, data.timestamp);
                    chatContainer.appendChild(leaveEl);
                    break;
                }

                case 'error': {
                    name = "Server Error";
                    text = data.message;
                    const errEl = createMessageElement(type, name, text, new Date().toISOString());
                    chatContainer.appendChild(errEl);
                    break;
                }
            }

            // Auto-scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function connect() {
            const serverUrl = serverUrlInput.value.trim();
            const name = userNameInput.value.trim();

            if (!serverUrl) {
                alert("Please enter a server URL.");
                return;
            }
            if (!name) {
                alert("Please enter a name.");
                return;
            }

            // Append name to URL as query parameter
            // Note: If URL already has query params, use &. If not, use ?. 
            // Simple approach: assume base URL. If strict compliance with spec "Connect to: wss://...?name=...", 
            // we will do basic replacement if no '?' exists, or append if '?name' exists.
            let fullUrl = serverUrl;
            if (!fullUrl.includes('?')) {
                fullUrl += `?name=${encodeURIComponent(name)}`;
            } else {
                // Check if name param already exists to avoid duplication
                if (new URL(fullUrl).searchParams.has('name') === false) {
                    fullUrl += `&name=${encodeURIComponent(name)}`;
                }
            }

            try {
                socket = new WebSocket(fullUrl);
                socket.onerror = (event) => {
                    console.error("WebSocket Error", event);
                    // Spec implies server might close on error, but let's show error UI
                    const el = createMessageElement('error', 'Connection Error', 'Error establishing connection.', new Date().toISOString()); // Generic error
                    chatContainer.appendChild(el);
                };
                socket.onopen = (event) => {
                    setConnectedState(true);
                };
                socket.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        updateDisplay(data);
                    } catch (e) {
                        console.error("Failed to parse message:", e);
                    }
                };
                socket.onclose = (event) => {
                    setConnectedState(false);
                    socket = null;
                };
            } catch (e) {
                alert("Invalid WebSocket URL format.");
            }
        }

        function disconnect() {
            if (socket) {
                socket.close();
                socket = null;
            }
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            if (socket && socket.readyState === WebSocket.OPEN) {
                const payload = {
                    type: "message",
                    text: text
                };
                socket.send(JSON.stringify(payload));
            } else {
                // Optional: Visual feedback that client couldn't send
                // But prompt says "Only display messages received from the server",
                // so we don't send a local message. We just ignore or wait for connect.
            }

            messageInput.value = '';
        }

        // --- Event Listeners ---

        btnConnect.addEventListener('click', connect);
        
        btnDisconnect.addEventListener('click', disconnect);

        btnSend.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e/key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize status
        setConnectedState(false);

    </script>
</body>
</html>
