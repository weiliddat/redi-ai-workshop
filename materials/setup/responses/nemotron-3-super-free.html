<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat Client</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 10px; background: #f0f0f0; border-bottom: 1px solid #ccc; }
        #controls input { margin-right: 8px; padding: 4px; }
        #controls button { padding: 4px 10px; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { margin: 6px 0; }
        .msg.system { color: #666; font-style: italic; }
        .msg.error { color: #c00; font-weight: bold; }
        .msg.chat { display: flex; align-items: flex-start; }
        .msg.chat .name { font-weight: bold; margin-right: 6px; }
        .msg.chat .text { max-width: 70%; word-wrap: break-word; }
        .msg.chat .timestamp { font-size: 0.8em; color: #999; margin-left: 6px; }
        #inputArea { padding: 10px; border-top: 1px solid #ccc; display: flex; }
        #inputArea input { flex: 1; padding: 6px; }
        #inputArea button { margin-left: 6px; padding: 6px 12px; }
    </style>
</head>
<body>
<div id="controls">
    <label>Server URL:
        <input type="text" id="serverUrl" value="ws://localhost:3000" placeholder="ws://example.com">
    </label>
    <label>Your Name:
        <input type="text" id="userName" placeholder="Enter name">
    </label>
    <button id="connectBtn">Connect</button>
    <span id="status" style="margin-left:10px;"></span>
</div>
<div id="chat"></div>
<div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" disabled>Send</button>
</div>

<script>
    const serverUrlInput = document.getElementById('serverUrl');
    const nameInput = document.getElementById('userName');
    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const chatEl = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let ws = null;

    function addSystem(text, isError = false) {
        const div = document.createElement('div');
        div.className = `msg ${isError ? 'error' : 'system'}`;
        div.textContent = text;
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addMessage(name, text, timestamp) {
        const div = document.createElement('div');
        div.className = 'msg chat';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'name';
        nameSpan.textContent = `${name}:`;
        const textSpan = document.createElement('span');
        textSpan.className = 'text';
        textSpan.textContent = text;
        const tsSpan = document.createElement('span');
        tsSpan.className = 'timestamp';
        tsSpan.textContent = new Date(timestamp).toLocaleTimeString();
        div.append(nameSpan, textSpan, tsSpan);
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function connect() {
        const serverUrl = serverUrlInput.value.trim();
        const name = nameInput.value.trim();
        if (!serverUrl || !name) {
            alert('Please fill both server URL and name.');
            return;
        }
        const url = `${serverUrl}${serverUrl.includes('?') ? '&' : '?'}name=${encodeURIComponent(name)}`;
        ws = new WebSocket(url);

        ws.onopen = () => {
            statusEl.textContent = 'Connected';
            statusEl.style.color = 'green';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            connectBtn.disabled = true;
            serverUrlInput.disabled = true;
            nameInput.disabled = true;
        };

        ws.onmessage = event => {
            let data;
            try { data = JSON.parse(event.data); } catch (_) { return; }
            switch (data.type) {
                case 'message':
                    addMessage(data.name, data.text, data.timestamp);
                    break;
                case 'join':
                    addSystem(`${data.name} joined`);
                    break;
                case 'leave':
                    addSystem(`${data.name} left`);
                    break;
                case 'error':
                    addSystem(data.message, true);
                    // Optionally close UI
                    break;
            }
        };

        ws.onclose = () => {
            statusEl.textContent = 'Disconnected';
            statusEl.style.color = 'red';
            messageInput.disabled = true;
            sendBtn.disabled = true;
            connectBtn.disabled = false;
            serverUrlInput.disabled = false;
            nameInput.disabled = false;
            ws = null;
        };

        ws.onerror = err => {
            console.error('WebSocket error', err);
            addSystem('WebSocket error', true);
        };
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({type: 'message', text}));
        messageInput.value = '';
    }

    connectBtn.addEventListener('click', connect);
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
