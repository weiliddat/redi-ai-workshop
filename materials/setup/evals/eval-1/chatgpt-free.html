<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebSocket Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 10px;
    }

    .controls input {
      margin-right: 5px;
      padding: 5px;
    }

    .controls button {
      padding: 5px 10px;
    }

    #status {
      margin-bottom: 10px;
      font-weight: bold;
    }

    #messages {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 5px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .message {
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    #chatForm input {
      width: 80%;
      padding: 5px;
    }

    #chatForm button {
      padding: 5px 10px;
    }
  </style>
</head>
<body>
  <h1>WebSocket Chat</h1>

  <div class="controls">
    <input id="serverUrl" type="text" value="ws://localhost:3000" />
    <input id="nameInput" type="text" placeholder="Your name" />
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
  </div>

  <div id="status">Disconnected</div>

  <div id="messages"></div>

  <form id="chatForm">
    <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
    <button type="submit">Send</button>
  </form>

  <script>
    let socket = null;

    const serverUrlInput = document.getElementById('serverUrl');
    const nameInput = document.getElementById('nameInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusEl = document.getElementById('status');
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addMessage(text) {
      const div = document.createElement('div');
      div.className = 'message';
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function connect() {
      const baseUrl = serverUrlInput.value.trim();
      const name = nameInput.value.trim();

      if (!baseUrl || !name) {
        alert('Please enter server URL and name');
        return;
      }

      const url = baseUrl + '?name=' + encodeURIComponent(name);

      socket = new WebSocket(url);

      socket.onopen = () => {
        setStatus('Connected');
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
      };

      socket.onclose = () => {
        setStatus('Disconnected');
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        socket = null;
      };

      socket.onerror = () => {
        setStatus('Disconnected');
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          const time = new Date(data.timestamp || Date.now()).toLocaleTimeString();

          if (data.type === 'message') {
            addMessage(`[${time}] ${data.name}: ${data.text}`);
          } else if (data.type === 'join') {
            addMessage(`[${time}] ${data.name} joined`);
          } else if (data.type === 'leave') {
            addMessage(`[${time}] ${data.name} left`);
          } else if (data.type === 'error') {
            addMessage(`[ERROR] ${data.message}`);
          }
        } catch (e) {
          addMessage('Invalid message received');
        }
      };
    }

    function disconnect() {
      if (socket) {
        socket.close();
      }
    }

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();

      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }

      const text = messageInput.value.trim();
      if (!text) return;

      socket.send(JSON.stringify({
        type: 'message',
        text: text
      }));

      messageInput.value = '';
    });
  </script>
</body>
</html>
