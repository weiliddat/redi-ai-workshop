<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .setup {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .setup label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .setup input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .setup button {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
        }

        .setup button:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        #chat {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            background: #fafafa;
        }

        .entry {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
        }

        .entry-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .entry-text {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        .entry-time {
            font-size: 0.75em;
            color: #666;
        }

        .error-entry {
            background: #fee;
            border-left: 3px solid #c00;
            color: #c00;
        }

        .join-entry {
            background: #efe;
            border-left: 3px solid #0a0;
            color: #060;
        }

        .leave-entry {
            background: #eff;
            border-left: 3px solid #00a;
            color: #006;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #messageInput:disabled {
            background: #eee;
        }

        #sendBtn {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #sendBtn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #sendBtn:hover:not(:disabled) {
            background: #555;
        }

        #statusBar {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            text-align: center;
        }

        #statusBar.connected {
            background: #dfd;
            color: #060;
        }

        #statusBar.disconnected {
            background: #fdd;
            color: #600;
        }

        #statusBar.error {
            background: #fdd;
            color: #c00;
        }
    </style>
</head>
<body>
    <h1>WebSocket Chat</h1>

    <div class="setup">
        <label for="serverUrl">Server URL</label>
        <input type="text" id="serverUrl" value="ws://localhost:3000" placeholder="ws://localhost:3000">

        <label for="username">Your Name</label>
        <input type="text" id="username" placeholder="Enter your name">

        <button type="button" id="connectBtn">Connect</button>
        <button type="button" id="disconnectBtn" disabled>Disconnect</button>
    </div>

    <div id="statusBar" class="disconnected">Disconnected</div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button type="button" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        (() => {
            var ws = null;

            var serverUrlInput = document.getElementById('serverUrl');
            var usernameInput = document.getElementById('username');
            var connectBtn = document.getElementById('connectBtn');
            var disconnectBtn = document.getElementById('disconnectBtn');
            var statusBar = document.getElementById('statusBar');
            var chat = document.getElementById('chat');
            var messageInput = document.getElementById('messageInput');
            var sendBtn = document.getElementById('sendBtn');

            function setStatus(status, className) {
                statusBar.textContent = status;
                statusBar.className = className;
            }

            function formatTime(timestamp) {
                var date = new Date(timestamp);
                return date.toLocaleTimeString();
            }

            function addEntry(entry) {
                var div = document.createElement('div');
                div.className = 'entry';

                if (entry.type === 'message') {
                    div.className += ' message-entry';
                    div.innerHTML =
                        '<div class="entry-name">' + escapeHtml(entry.name) + '</div>' +
                        '<div class="entry-text">' + escapeHtml(entry.text) + '</div>' +
                        '<div class="entry-time">' + formatTime(entry.timestamp) + '</div>';
                } else if (entry.type === 'join') {
                    div.className += ' join-entry';
                    div.innerHTML =
                        '<div class="entry-text">' +
                        escapeHtml(entry.name) + ' joined at ' + formatTime(entry.timestamp) +
                        '</div>';
                } else if (entry.type === 'leave') {
                    div.className += ' leave-entry';
                    div.innerHTML =
                        '<div class="entry-text">' +
                        escapeHtml(entry.name) + ' left at ' + formatTime(entry.timestamp) +
                        '</div>';
                } else if (entry.type === 'error') {
                    div.className += ' error-entry';
                    div.innerHTML =
                        '<div class="entry-text">Error: ' + escapeHtml(entry.message) + '</div>';
                }

                chat.appendChild(div);
                chat.scrollTop = chat.scrollHeight;
            }

            function escapeHtml(text) {
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function connect() {
                var serverUrl = serverUrlInput.value.trim() || 'ws://localhost:3000';
                var name = usernameInput.value.trim();

                if (!name) {
                    alert('Please enter your name');
                    return;
                }

                var fullUrl = serverUrl + '?name=' + encodeURIComponent(name);
                ws = new WebSocket(fullUrl);

                ws.onopen = () => {
                    setStatus('Connected', 'connected');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                };

                ws.onclose = () => {
                    setStatus('Disconnected', 'disconnected');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    ws = null;
                };

                ws.onerror = () => {
                    setStatus('Connection error', 'error');
                };

                ws.onmessage = (event) => {
                    try {
                        var data = JSON.parse(event.data);
                        addEntry(data);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };
            }

            function disconnect() {
                if (ws) {
                    ws.close();
                }
            }

            function send() {
                var text = messageInput.value.trim();
                if (ws && ws.readyState === WebSocket.OPEN && text) {
                    ws.send(JSON.stringify({ type: 'message', text: text }));
                    messageInput.value = '';
                }
            }

            connectBtn.addEventListener('click', connect);
            disconnectBtn.addEventListener('click', disconnect);
            sendBtn.addEventListener('click', send);

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    send();
                }
            });
        })();
    </script>
</body>
</html>
