<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        /* CSS Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            background-color: #fff;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
            width: 300px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button#connect-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button#connect-btn:hover {
            background-color: #0056b3;
        }

        /* Chat Interface */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        #header {
            background-color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        #status {
            font-size: 14px;
            font-weight: bold;
        }

        .status-connected {
            color: #28a745;
        }

        .status-disconnected {
            color: #dc3545;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-container {
            background-color: #fff;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            word-wrap: break-word;
        }

        .message-header {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }

        .timestamp {
            margin-right: 8px;
            font-family: monospace;
        }

        .sender {
            font-weight: bold;
            margin-right: 5px;
        }

        .message-text {
            font-size: 15px;
        }

        /* System messages like join/leave */
        .system-message {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin: 10px 0;
            border-bottom: 1px solid #eee;
        }

        /* Input Area */
        #input-area {
            background-color: #fff;
            padding: 15px;
            border-top: 1px solid #ccc;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        #send-btn {
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        #send-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <main id="setup-screen">
        <h2 style="margin-bottom: 20px;">Enter Details</h2>
        <div class="form-group">
            <label for="server-url">Server URL</label>
            <input type="text" id="server-url" placeholder="e.g. quick-badly-amoeba.ngrok-free.app" value="quick-badly-amoeba.ngrok-free.app">
        </div>
        <div class="form-group">
            <label for="username">Your Name</label>
            <input type="text" id="username" placeholder="Choose a name">
        </div>
        <button id="connect-btn">Connect</button>
    </main>

    <!-- Chat Screen -->
    <main id="chat-screen">
        <header id="header">
            <span id="status">Disconnected</span>
            <span style="font-size: 12px;">Your Name: <span id="display-name"></span></span>
        </header>

        <div id="messages">
            <!-- Messages will be injected here -->
        </div>

        <div id="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </main>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const chatScreen = document.getElementById('chat-screen');
        const serverInput = document.getElementById('server-url');
        const nameInput = document.getElementById('username');
        const connectBtn = document.getElementById('connect-btn');
        const statusEl = document.getElementById('status');
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const displayNameEl = document.getElementById('display-name');

        let socket = null;

        // Connection Logic
        connectBtn.addEventListener('click', () => {
            const serverUrl = serverInput.value.trim();
            const name = nameInput.value.trim();

            if (!serverUrl || !name) {
                // Simple validation feedback (alert is plain, but to strictly follow "no toast notifications", 
                // we will rely on the user reading the setup screen.
                // For error messages, we use the chat log which allows reconnection).
                return;
            }

            // Simple state logic: Connect
            statusEl.textContent = 'Connecting...';
            statusEl.className = 'status-disconnected'; // Visual feedback before open

            // Construct URL: wss://[server-url]?name=[name]
            // Remove protocol if user included it to ensure we use WSS
            let cleanUrl = serverUrl.replace(/^https?:\/\//, '');
            // Ensure it starts with wss://
            cleanUrl = cleanUrl.replace(/^wss?:\/\//, 'wss://');
            
            const connectionUrl = `${cleanUrl}?name=${encodeURIComponent(name)}`;

            try {
                socket = new WebSocket(connectionUrl);
            } catch (e) {
                addSystemMessage("Failed to create WebSocket connection.");
                resetToSetup();
            }

            socket.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'status-connected';
                setupScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                displayNameEl.textContent = name;
                messageInput.focus();
                sendBtn.disabled = false;
            };

            socket.onclose = () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'status-disconnected';
                resetToSetup();
            };

            socket.onerror = (error) => {
                // Note: standard WebSocket errors usually don't provide detailed message in 'error' event data
                // The server's JSON error will be sent via 'message' event if applicable
                console.error("WebSocket Error:", error);
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };
        });

        // Reset UI to setup screen
        function resetToSetup() {
            chatScreen.style.display = 'none';
            setupScreen.style.display = 'flex';
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'status-disconnected';
            sendBtn.disabled = true;
            messageInput.value = '';
        }

        // Send Logic
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && socket && socket.readyState === WebSocket.OPEN) {
                const payload = {
                    type: "message",
                    text: text
                };
                socket.send(JSON.stringify(payload));
                messageInput.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Message Handling Logic
        function handleServerMessage(data) {
            switch (data.type) {
                case "message":
                    addChatMessage(data.name, data.text, data.timestamp);
                    break;
                case "join":
                    addSystemMessage(`${data.name} joined the chat.`, data.timestamp);
                    break;
                case "leave":
                    addSystemMessage(`${data.name} left the chat.`, data.timestamp);
                    break;
                case "error":
                    addSystemMessage(`Error: ${data.message}`, new Date().toISOString());
                    break;
                default:
                    // Ignore unknown types or log
                    console.log("Unknown message type:", data.type);
            }
        }

        function addChatMessage(name, text, timestamp) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-container';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';

            const timeSpan = document.createElement('span');
            timeSpan.className = 'timestamp';
            timeSpan.textContent = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = name + ":";

            headerDiv.appendChild(timeSpan);
            headerDiv.appendChild(senderSpan);

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = text;

            msgDiv.appendChild(headerDiv);
            msgDiv.appendChild(textDiv);
            
            // Attach timestamp to div for easier sorting if needed later
            msgDiv.dataset.timestamp = timestamp;

            messagesContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function addSystemMessage(text, timestamp) {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = `[${new Date(timestamp).toLocaleTimeString()}] ${text}`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
